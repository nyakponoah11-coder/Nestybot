<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
</head>
<body>

<h1>NestyDatagh💙 Dashboard</h1>

<p>Total Orders: <span id="orders">0</span></p>
<p>Revenue: ₵<span id="revenue">0</span></p>
<p>Delivered: <span id="delivered">0</span></p>

<div id="list"></div>

<script>
async function load() {
  const res = await fetch("/admin-data");
  const data = await res.json();

  document.getElementById("orders").innerText = data.total;
  document.getElementById("revenue").innerText = data.revenue;
  document.getElementById("delivered").innerText = data.delivered;

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.orders.forEach(o => {
    list.innerHTML +=
      `<p>${o.phone} - ${o.network} - ₵${o.amount}</p>`;
  });
}

load();
</script>

</body>
</html>
